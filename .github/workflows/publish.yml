name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install -g npm@latest
      - run: npm --version
      - run: npm ci
      - run: npm run typecheck
      - run: npm run check:bin
      - run: npm run check:pack-install
      # Auth via an npm Automation access token stored as the repo secret NPM_TOKEN.
      # (Trusted Publishing is the no-secret alternative, but requires the npmjs-side
      # publisher config to match exactly; the token path is deterministic.)
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
